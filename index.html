<style>
.guy{
    position:absolute;
    width:32px;
    height:32px;
    image-rendering:pixelated;
    z-index:9999;
}

body{
    margin:0;
    overflow:hidden;
}
</style>

<script>
window.onload = () => {

const guys=[];

const sprites = [
    "mid.png",
    "run.png"
];

for(let i=0;i<6;i++){

    let img=document.createElement("img");
    img.className="guy";
    img.src=sprites[0];

    document.body.appendChild(img);

    guys.push({
        el:img,
        x:Math.random()*(window.innerWidth-32),
        y:Math.random()*(window.innerHeight-32),
        dx:0,
        dy:0,
        steps:0,
        anim:0
    });
}


setInterval(()=>{

    for(const g of guys){

        if(g.steps<=0){
            g.dx=Math.floor(Math.random()*3)-1;
            g.dy=Math.floor(Math.random()*3)-1;
            g.steps=Math.floor(Math.random()*15+5);
        }

        g.x+=g.dx*4;
        g.y+=g.dy*4;
        g.steps--;


        g.anim++;

        if(g.anim%2==0){
            g.el.src=sprites[1];
        }else{
            g.el.src=sprites[0];
        }


        if(g.x<0) g.x=0;
        if(g.y<0) g.y=0;
        if(g.x>innerWidth-32) g.x=innerWidth-32;
        if(g.y>innerHeight-32) g.y=innerHeight-32;


        g.el.style.left=g.x+"px";
        g.el.style.top=g.y+"px";


        if(g.dx<0){
            g.el.style.transform="scaleX(-1)";
        }else{
            g.el.style.transform="scaleX(1)";
        }
    }

},120);

};
</script>
